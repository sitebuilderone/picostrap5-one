<section id="services-03" class="py-6">
	<div class="container">
		<div class="row">
			<div class="col-md-12">
				<div class="p-5 mb-2 lc-block text-center">
					<div class="lc-block mb-4">
						<div editable="rich">
							<h2>
								<tangible class="live-refresh">[sbo_field name="one_services_title"]</tangible>
							</h2>
							<tangible class="live-refresh">
								<p class="lead">[sbo_field name="one_services_overview"]</p>
							</tangible>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
	<div class="container overflow-hidden">
		<tangible class="live-refresh">
			<loop class="row row-cols-2 row-cols-lg-4 g-lg-5 mb-6" type="service" paged="4" orderby="menu_order" order="asc">
				<div class="col">
					<div class="lc-block mb-4">
						<if field="image">
							<img loading="lazy" src="{Field image_url size='large'}"
								srcset="{Field image_srcset}" sizes="{Field image_sizes}"
								class="img-fluid w-100 object-fit-cover"
								style="aspect-ratio:1/1" alt="{Field image_alt}">
							<else>
								<img loading="lazy" src="https://placehold.co/400x400"
									class="img-fluid w-100 object-fit-cover"
									style="aspect-ratio:1/1" alt="Placeholder">
							</else>
						</if>
					</div>
					<div class="lc-block">
						<div editable="rich">
							<h3>
								<a href="{Field url}" class="stretched-link">
									<field name="title"></field>
								</a>
							</h3>
							<p class="lead">
								<field name="excerpt" words="120" auto="true"></field>
							</p>
						</div>
					</div>
				</div>
			</loop>
		</tangible>
		<div class="row">
			<div class="col-md-12">
				<div class="lc-block text-center">
					<a class="btn btn-primary btn-lg" href='[sbo_url name="one_cta_url"]' role="button">
						<tangible class="live-refresh">[sbo_field name="one_cta_text"]</tangible>
					</a>
				</div>
			</div>
		</div>
	</div>
</section>
