<section id="sb1-marketing-hero-02" class="py-5 bg-light">
	<tangible class="live-reload">
		<Set name="hero_img">
			<Shortcode sbo_url name="one_marketing_image"></Shortcode>
		</Set>
		<div class="container">
			<div class="row align-items-center g-5">
				<div class="col-lg-6">
					<h1 class="display-4 fw-bold mb-3">
						[sbo_field name="one_headline"]
					</h1>

					<p class="lead text-muted mb-4">
						[sbo_field name="one_headline_support"]
					</p>

					<div class="d-flex flex-wrap gap-2">
						<a href='[sbo_url name="one_cta_url"]' class="btn btn-primary btn-lg">
							[sbo_field name="one_cta_text"]
						</a>

						<a href='[sbo_url name="one_cta_url_02"]' class="btn btn-outline-secondary btn-lg">
							[sbo_field name="one_cta_text_02"]
						</a>
					</div>
				</div>

				<div class="col-lg-6">
					<img src="{Get hero_img}" class="img-fluid rounded shadow" alt='[sbo_field name="one_headline"]'>
				</div>
			</div>
		</div>
	</tangible>

</section>
