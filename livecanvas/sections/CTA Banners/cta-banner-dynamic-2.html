<section>
	<div style="background:url(https://cdn.livecanvas.com/media/backgrounds/bgjar/WorldMap.svg); background-size: auto; background-position: center center; background-repeat: no-repeat;" class="py-6 py-lg-8 container-fluid px-0">
		<div class="container text-center py-6">
			<div class="row">
				<div class="col-lg-6 col-xl-5 mx-auto">
					<div class="lc-block mb-3">
						<div editable="rich">
							<h1>
								<tangible class="live-reload">[sbo_field name="one_headline"]</tangible>
							</h1>
						</div>
					</div>

					<div class="lc-block mb-5">
						<div editable="rich">
							<p class="lead">
								<tangible class="live-reload">[sbo_field name="one_headline_support"]</tangible>
							</p>
						</div>
					</div>

					<div class="lc-block">
						<a class="btn btn-primary btn-lg" href='[sbo_url name="one_cta_url"]' role="button">
							<tangible class="live-reload">[sbo_field name="one_cta_text"]</tangible>
						</a>
					</div>
				</div>
			</div>
		</div>
	</div>
</section>
